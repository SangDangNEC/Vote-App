const Input_db1 = firebase.firestore();

const INPUT_AREA_FIRESTORE_MAP = {
    "낭성면": Input_db1,
    "미원면": Input_db1,
    "가덕면": Input_db1,

};

function Input_getCurrentDB() {
    const area = document.getElementById("Input_sheetSelect").value;
    return INPUT_AREA_FIRESTORE_MAP[area];
}

let Input_unsubscribeFirestore = null;
let Input_hasRemoteUpdate = false;

let Input_sessionId = sessionStorage.getItem("Input_sessionId");
if (!Input_sessionId) {
    Input_sessionId =        Math.random().toString(36).substring(2) +        Date.now().toString(36);
    sessionStorage.setItem("Input_sessionId", Input_sessionId);
}

function Input_startFirestoreListener() {

    // 기존 감시 종료
    if (Input_unsubscribeFirestore) {
        Input_unsubscribeFirestore();
    }

    const currentDB = Input_getCurrentDB();

    const election = Input_getCurrentElection();
    const pollName = Input_getPollName();

    const docRef = currentDB
        .collection("polls")
        .doc(election)
        .collection("voting")
        .doc(pollName);

    let firstSnapshot = true;

    Input_unsubscribeFirestore = docRef.onSnapshot(function (snap) {

        if (!snap.exists) return;

        // 처음 한 번은 현재 데이터 읽기이므로 무시
        if (firstSnapshot) {
            firstSnapshot = false;
            return;
        }

	 // ★ 내가 저장한 것은 무시
	    if (snap.data().updatedBy === Input_sessionId) {
	        return;
	    }

        Input_hasRemoteUpdate = true;
        localStorage.setItem("Input_remoteUpdateNotice", "Y");

        Input_showRemoteNotice();

    });
}

function Input_showRemoteNotice() {
    const notice = document.getElementById("Input_changeNotice");

    notice.innerHTML =
        '📢 다른 사용자가 새로운 데이터를 저장하였습니다. <br> 새로 불러오면 현재 작성중인 데이터는 사라집니다. ' +
        '<button id="Input_reloadFirestoreBtn">새로 불러오기</button>';

    notice.style.display = "block";

    document.getElementById("Input_reloadFirestoreBtn").onclick = function () {
        Input_hasRemoteUpdate = false;
        localStorage.removeItem("Input_remoteUpdateNotice");
        Input_loadFromDB();
    };
}


function Input_restoreNotice() {
    const saved = localStorage.getItem("Input_remoteUpdateNotice");

    if (saved === "Y") {
        Input_showRemoteNotice();
    }
}

async function Input_loadExcelBaseInfo(e) {

    const file = e.target.files[0];
    if (!file) return;

    const result = await Input_tryLoadFromFirestore();
    if(result.success){
        setInput_excelBaseDataFromDB(result.data, Input_getPollName());
        await Input_loadFromDB(result.data);

        Input_isExceLoaded = true;
        localStorage.setItem("Input_excelLoaded", "true");
        document.getElementById("Input_loadBaseInfoBtn").disabled = true;
        document.getElementById("Input_reportBtn").disabled = true;
        document.getElementById("Input_loadExcelBtn").disabled = true;

        document.getElementById("Input_confirmBtn").disabled = false;   // 확정버튼
        document.getElementById("Input_resetBtn").disabled = false;

         const isSaved = localStorage.getItem("Input_saveState") === "saved";

        document.getElementById("Input_loadBaseInfoBtn").disabled = !(Input_isServerOnline && Input_isConfirmed && isSaved);
        return;
    }

    const buffer = await file.arrayBuffer();

    const workbook = XLSX.read(buffer, {        type: "array"    });

    const sheet = workbook.Sheets["내용입력"];

    if (!sheet) {
	Input_excelBaseData = {};

	    localStorage.removeItem("Input_excelBaseData");
	    localStorage.removeItem("Input_excelLoaded");
	    Input_updateExcelButtonState();

        alert("내용입력 시트를 찾을 수 없습니다.");
        return;
    }

    const rows = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: ""
    });

    Input_excelBaseData = {};

    let currentPoll = "";
    let currentBoxNo = "";

    for (let r = 3; r < rows.length; r++) {

        // 병합셀 처리
        if (rows[r][0]) {            currentPoll = rows[r][0];         }	//A열
        if (rows[r][1]) {            currentBoxNo = rows[r][1];         }	//B열

        const pollName = currentPoll;

        if (!pollName) continue;

        const voterCount = rows[r][3];   // D
        const startNo    = rows[r][13];  // N
        const currNo      = rows[r][14];  // O
        const endNo      = rows[r][15];  // P


        if (!Input_excelBaseData[pollName]) {             Input_excelBaseData[pollName] = [];         }

        Input_excelBaseData[pollName].push({
            voterCount,
            startNo,
  	    currNo,
            endNo,
	    boxNo: currentBoxNo
        });

    }

     if (Object.keys(Input_excelBaseData).length === 0) {
        localStorage.removeItem("Input_excelBaseData");
        localStorage.removeItem("Input_excelLoaded");

        Input_updateExcelButtonState();
        alert("엑셀에서 기준정보를 찾지 못했습니다.");
        return;
    }

    localStorage.setItem(        "Input_excelBaseData",        JSON.stringify(Input_excelBaseData)    );

        document.getElementById("Input_changeNotice").innerText =            "⚠️ 기초자료 로딩 완료";
        document.getElementById("Input_changeNotice").style.display = "block";


    Input_isExceLoaded = true;
    localStorage.setItem("Input_excelLoaded", "true");

    document.getElementById("Input_loadBaseInfoBtn").disabled = true;
    Input_updateExcelButtonState();
    loadInput_offlineBaseData();
    document.getElementById("Input_loadBaseInfoBtn").disabled = true;     // 기본정보 불러오기
    document.getElementById("Input_reportBtn").disabled = true;

}

function Input_checkEndLimit(i) {
    const startEl = document.getElementById('Input_start_' + i);
    const endEl = document.getElementById('Input_end_' + i);
    const currEl = document.getElementById('Input_curr_' + i);

    const start = parseInt(startEl.value) || 0;
    const end = parseInt(endEl.value) || 0;
    const curr = parseInt(currEl.value) || 0;

    // 👉 기존 에러 스타일 제거
    currEl.classList.remove("input-error");

    // ❗ 수령 끝번호 초과
    if (end > 0 && curr > end) {
        alert("수령 끝번호보다 큰 수가 입력되었습니다. 확인 후 다시 입력해 주세요");

        currEl.classList.add("input-error");
        currEl.value = "";
        Input_calc(i);
        return;
    }

    // ❗ 수령 첫번호 미만
    if (start > 0 && curr < start) {
        alert("수령 첫번호보다 작은 수가 입력되었습니다. 확인 후 다시 입력해 주세요");

        currEl.classList.add("input-error");
        currEl.value = "";
        Input_calc(i);
        return;
    }
}


function Input_calc(i) {
        const start = parseInt(document.getElementById('Input_start_' + i).value) || 0;
        const end = parseInt(document.getElementById('Input_end_' + i).value) || 0;
        const curr = parseInt(document.getElementById('Input_curr_' + i).value) || 0;
        const dmg = parseInt(document.getElementById('Input_dmg_' + i).value) || 0;
        const dupSerial = parseInt(    document.getElementById('Input_dupSerial_' + i).value) || 0;

        const NoBalsong= parseInt(document.getElementById('Input_NoBalsong_' + i).value) || 0;
        const GeulJung= parseInt(document.getElementById('Input_GeulJung_' + i).value) || 0;
        const GiveBack= parseInt(document.getElementById('Input_GiveBack_' + i).value) || 0;

        const ReturnKorea= parseInt(document.getElementById('Input_ReturnKorea_' + i).value) || 0;
        const DoubleOut= parseInt(document.getElementById('Input_DoubleOut_' + i).value) || 0;

        if (start > 0 && end > 0) {

	const total = (start > 0 && end > 0) ? (end - start + 1  + dupSerial ) :  dupSerial;
	    document.getElementById('Input_total_' + i).innerText = total.toLocaleString();

	    if (curr > 0) {
	        const remain = (end - curr + 1) + dmg;
	        const issued = total - remain;

	        document.getElementById('Input_issued_' + i).innerText = (issued < 0 ? 0 : issued).toLocaleString();
	        document.getElementById('Input_remain_' + i).innerText = (remain < 0 ? 0 : remain).toLocaleString();
	    }
        }
    }

function setInput_excelBaseDataFromDB(rows, pollName) {

    if (!Array.isArray(rows) || !pollName) return false;

    Input_excelBaseData = {};

    Input_excelBaseData[pollName] = rows.map(row => ({
        voterCount: row.voterCount || "",
        startNo: row.start || "",
        endNo: row.end || "",
        boxNo: row.boxNo || ""
    }));

    localStorage.setItem(        "Input_excelBaseData",        JSON.stringify(Input_excelBaseData)    );

    return true;
}

async function Input_saveToFirestore() {

    try {

        const rows = [];
        const nowTime = Input_getExcelTime();
	
        Input_elections.forEach((_, i) => {


            rows.push({
		
		election: Input_elections[i],
	        voterCount: Input_excelBaseData[Input_getPollName()]?.[i]?.voterCount || "",

                start: document.getElementById("Input_start_" + i).value || "",
                end: document.getElementById("Input_end_" + i).value || "",
                total: document.getElementById("Input_total_" + i).innerText.replace(/,/g,""),

                curr: document.getElementById("Input_curr_" + i).value || "",

                noBalsong: document.getElementById("Input_NoBalsong_" + i).value || "",
                geulJung: document.getElementById("Input_GeulJung_" + i).value || "",
                giveBack: document.getElementById("Input_GiveBack_" + i).value || "",
                returnKorea: document.getElementById("Input_ReturnKorea_" + i).value || "",

                dmg: document.getElementById("Input_dmg_" + i).value || "",
                damageNos: Input_damageData[i] || "",

                doubleOut: document.getElementById("Input_DoubleOut_" + i).value || "",
                dupSerial: document.getElementById("Input_dupSerial_" + i).value || "",


                 boxNo: Input_excelBaseData[Input_getPollName()]?.[i]?.boxNo || "",

	         inputTime: nowTime,
            });

        });

        const election = Input_getCurrentElection();

    const pollName = Input_getPollName();

    const currentDB = Input_getCurrentDB();
    const docRef = currentDB
        .collection("polls")
        .doc(election)
        .collection("voting")
        .doc(pollName);

    await docRef.set({
        rows: rows,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
	updatedBy: Input_sessionId
    });

        return true;

    } catch(err){
        return false;
    }
}

function Input_getExcelTime() {
    const now = new Date();

    return (
        now.getHours() / 24 +
        now.getMinutes() / 1440 +
        now.getSeconds() / 86400 +
        now.getMilliseconds() / 86400000
    );
}

async function Input_loadFromFirestore(election, pollName) {

    const currentDB = Input_getCurrentDB();

    const docRef = currentDB
        .collection("polls")
        .doc(election)
        .collection("voting")
        .doc(pollName);

    const snap = await docRef.get();

    if (!snap.exists) {
        throw new Error("저장된 데이터가 없습니다.");
    }

    return snap.data().rows || [];
}

async function Input_saveToDB() {

    const notice = document.getElementById("Input_changeNotice");
    Input_showSaving();

    setTimeout(async () => {
        Input_saveData();
        const pollName = Input_getPollName();

        const data = {
            pollName: pollName,
            curr: {},
            noBalsong: {},
            geulJung: {},
            giveBack: {},
            dmg: {},
            damageNos: {},
            doubleOut: {},
            returnKorea: {},
            dupSerial: {},
            changedIndex: []
        };

        // ⭐ 변경된 값만 저장
        Input_elections.forEach((_, i) => {

            const curr = {
                curr: document.getElementById('Input_curr_' + i).value || 0,
                noBalsong: document.getElementById('Input_NoBalsong_' + i).value || 0,
                geulJung: document.getElementById('Input_GeulJung_' + i).value || 0,
                giveBack: document.getElementById('Input_GiveBack_' + i).value || 0,
                dmg: document.getElementById('Input_dmg_' + i).value || 0,
                damageNos: Input_damageData[i] || "",
                doubleOut: document.getElementById('Input_DoubleOut_' + i).value || 0,
                returnKorea: document.getElementById('Input_ReturnKorea_' + i).value || 0,
                dupSerial: document.getElementById('Input_dupSerial_' + i).value || 0

            };

            const orig = Input_originalData[i] || {};

            let changed = false;

            for (let key in curr) {
                if (String(orig[key] ?? "") !== String(curr[key])) {
                    changed = true;
                    break;
                }
            }

            if (changed) {
                data.changedIndex.push(i);

                data.curr[i] = curr.curr;
                data.noBalsong[i] = curr.noBalsong;
                data.geulJung[i] = curr.geulJung;
                data.giveBack[i] = curr.giveBack;
                data.dmg[i] = curr.dmg;
                data.damageNos[i] = curr.damageNos;
                data.doubleOut[i] = curr.doubleOut;
                data.returnKorea[i] = curr.returnKorea;
                data.dupSerial[i] = curr.dupSerial;
            }
        });

        document.getElementById("Input_saveWarning").style.display = "none";

        const ok = await Promise.race([
	    Input_saveToFirestore(),
	    new Promise(resolve => setTimeout(() => resolve(false), 10000))
	]);

	Input_hideSaving();

        if (!ok) {

            Input_markOffline();

            Input_isOnlineSaveState = false;
            localStorage.setItem("Input_isOnlineSaveState", "false");

            notice.innerText = "📴 오프라인 모드 : 현재 입력값으로 작성자료를 생성합니다.";
            notice.style.display = "block";

        } else {

            Input_markOnline();

            Input_isOnlineSaveState = true;
            localStorage.setItem("Input_isOnlineSaveState", "true");

            Input_clearChanged();

            Input_setSavedState();
            localStorage.setItem("Input_saveState", "saved");

            Input_markSynced();
	    Input_startFirestoreListener();

	    notice.innerText = "";
            notice.style.display = "none";
            document.getElementById("Input_saveWarning").style.display = "none";
        }

        document.getElementById("Input_reportBtn").disabled = false;
        document.getElementById("Input_saveBtn").disabled = true;

    }, 1000);
}

async function Input_loadFromDB(preloadedData = null) {

    try {
        Input_showLoading();

        const election = Input_getCurrentElection();

        if (!election) {
            Input_hideLoading();
            alert("선거명을 선택하세요.");
            return;
        }

        const pollName = Input_getPollName();
        const data = preloadedData ? preloadedData  : await Input_loadFromFirestore(election, pollName);

        Input_markOnline();
        Input_originalData = {};

        // 👉 핵심: 배열 그대로 처리
        data.forEach((item, i) => {

            Input_originalData[i] = {
                start: item.start || "",
                curr: item.curr || "",
                noBalsong: item.noBalsong || "",
                geulJung: item.geulJung || "",
                giveBack: item.giveBack || "",
                returnKorea: item.returnKorea || "",
                dmg: item.dmg || "",
                damageNos: item.damageNos || "",
                doubleOut: item.doubleOut || "",
                dupSerial: item.dupSerial || "",
                boxNo: item.boxNo || "",
                inputTime: item.inputTime || ""
            };

            const excel = Input_excelBaseData[Input_getPollName()]?.[i];

            document.getElementById('Input_start_' + i).value =                item.start || excel?.startNo || "";

            document.getElementById('Input_end_' + i).value =                item.end || excel?.endNo || "";

            document.getElementById('Input_total_' + i).innerText =                Number(item.total || 0).toLocaleString();

            document.getElementById('Input_curr_' + i).value = item.curr || "";
            document.getElementById('Input_dupSerial_' + i).value = item.dupSerial || "";

            Input_damageData[i] = item.damageNos || "";

            const list = (item.damageNos || "")
                .split("/")
                .map(v => v.trim())
                .filter(v => v);

            let count = 0;

            list.forEach(val => {
                if (val.includes("~")) {
                    const nums = val.replace("No. ", "").split("~");
                    const start = Number(nums[0]);
                    const end = Number(nums[1]);

                    if (start && end) {
                        count += (end - start + 1);
                    }
                } else {
                    count += 1;
                }
            });

            document.getElementById('Input_dmg_' + i).value = count;
            document.getElementById('Input_NoBalsong_' + i).value = item.noBalsong || "";
            document.getElementById('Input_GeulJung_' + i).value = item.geulJung || "";
            document.getElementById('Input_GiveBack_' + i).value = item.giveBack || "";
            document.getElementById('Input_ReturnKorea_' + i).value = item.returnKorea || "";
            document.getElementById('Input_DoubleOut_' + i).value = item.doubleOut || "";

            Input_calc(i);
            Input_validateCurrRange(i);
        });

        // ✅ 투표함관리번호 처리
        const boxSet = new Set();

        data.forEach(d => {
            if (d.boxNo) boxSet.add(d.boxNo);
        });

        const boxList = Array.from(boxSet);

        localStorage.setItem("Input_box_info", JSON.stringify(boxList));

        document.getElementById("Input_boxInfo").innerText =            "📦 투표함관리번호: " + boxList.join(" / ");

        Input_saveData();

        Input_hideLoading();

        // 20260604
        document.getElementById("Input_saveBtn").disabled = false;
        document.getElementById("Input_reportBtn").disabled = false;
        document.getElementById("Input_loadBaseInfoBtn").disabled = false;

        localStorage.setItem("Input_saveState", "saved");
        localStorage.setItem("Input_buttons_enabled", "Y");

        Input_setSavedState();
        Input_markSynced();
        Input_startFirestoreListener();

        document.getElementById("Input_changeNotice").style.display = "none";
        Input_clearChanged();

        // DB에서 읽어오면 '새로 불러오기' 메시지 초기화	
        Input_hasRemoteUpdate = false;
        localStorage.removeItem("Input_remoteUpdateNotice");

    } catch (err) {

        Input_markOffline();

        document.getElementById("Input_loadBaseInfoBtn").disabled = true;

        Input_fillStartEndFromExcel();

        Input_hideLoading();

        const notice = document.getElementById("Input_changeNotice");
        const Input_excelLoaded = localStorage.getItem("Input_excelLoaded") === "true";

        if (Input_excelLoaded) {
            notice.innerText = "📴 오프라인 모드 : 현재 입력값으로 작성자료를 생성합니다.";
        } else {
            notice.innerText = "⚠️ 온라인 연결에 실패했습니다. 먼저 엑셀파일을 불러와 주세요.";
        }

        notice.style.display = "block";
    }
}

function Input_buildOfflineReportData() {

     const pollName = Input_getPollName();
    const boxList = JSON.parse(localStorage.getItem("Input_box_info") || "[]");
    const boxNo = [...new Set(boxList)].filter(v => v).join(" / ");


    return Input_elections.map((name, index) => ({

        election: name,

function Input_saveDamageNumbers() {
    const inputs = document.querySelectorAll("#Input_damageList input");

    for (let input of inputs) {
        if (!Input_validateDamageInput(input)) return; // ❗ 하나라도 틀리면 저장 중단
    }

    let ranges = [];

    inputs.forEach(input => {
        const val = input.value.trim();
        if (!val) return;

        const r = parseRange(val);
        if (r) ranges.push(r);
    });

    // ✅ 1. 정렬
    ranges.sort((a, b) => a[0] - b[0]);

    // ✅ 2. 자동 병합
    const merged = [];

    ranges.forEach(r => {
        if (!merged.length) {
            merged.push(r);
        } else {
            const last = merged[merged.length - 1];

            // 👉 이어지거나 겹치면 병합
            if (r[0] <= last[1] + 1) {
                last[1] = Math.max(last[1], r[1]);
            } else {
                merged.push(r);
            }
        }
    });

    // ✅ 3. 문자열 + 개수 계산
    let result = [];
    let totalCount = 0;

    merged.forEach(([start, end]) => {
        if (start === end) {
            result.push(`No. ${start}`);
            totalCount += 1;
        } else {
            result.push(`No. ${start} ~ ${end}`);
            totalCount += (end - start + 1);
        }
    });

    Input_damageData[Input_currentDamageIndex] = result.join(" / ");

    document.getElementById('Input_dmg_' + Input_currentDamageIndex).value = totalCount;

    Input_calc(Input_currentDamageIndex);
    Input_markChanged();

    Input_closeDamageModal();

    Input_damageChanged = false;
    Input_updateSaveButtonState();
}

    Input_updateSaveButtonState();

function parseRange(val) {
    val = val.trim();

    if (val.includes("~")) {
        const [start, end] = val.split("~").map(v => Number(v));
        if (!start || !end || start > end) return null;
        return [start, end];
    } else {
        const num = Number(val);
        if (!num) return null;
        return [num, num];
    }
}

function isOverlap(r1, r2) {
    return !(r1[1] < r2[0] || r2[1] < r1[0]);
}

function Input_enforceNonNegative(el) {
    if (el.value === "") return;

    let val = Number(el.value);

    if (val < 0) {
        el.value = 0;
    }
}

function Input_validateDamageInput(inputEl) {
    const val = inputEl.value.trim();
    const range = parseRange(val);

    const i = Input_currentDamageIndex;

    const start = parseInt(document.getElementById('Input_start_' + i).value) || 0;
    const end = parseInt(document.getElementById('Input_end_' + i).value) || 0;

    inputEl.classList.remove("input-error");

    if (!range) return true;

    const [s, e] = range;

    // ❗ 음수 체크
    if (s < 0 || e < 0) {
        alert("0보다 작은 번호는 입력할 수 없습니다.");
        inputEl.classList.add("input-error");
        return false;
    }

    // ❗ 수령 범위 체크
    if (start && s < start || end && e > end) {
        alert("수령 범위를 벗어난 번호입니다.");
        inputEl.classList.add("input-error");
        return false;
    }

    return true;
}
