input[readonly]:not(.no-gray) {

function setElectionDisabled(disabled) {

    const prefixes = [
        "curr_",
        "dupSerial_",
        "NoBalsong_",
        "GeulJung_",
        "GiveBack_",
        "DoubleOut_",
        "dmg_"
    ];

    prefixes.forEach(prefix => {
        document.querySelectorAll(`input[id^="${prefix}"]`).forEach(input => {
            input.disabled = disabled;
        });
    });

}


async function loadExcelBaseInfo(e) {

    const file = e.target.files[0];
    if (!file) return;

    const buffer = await file.arrayBuffer();

    const workbook = XLSX.read(buffer, {
        type: "array"
    });

    const sheet = workbook.Sheets["내용입력"];

    if (!sheet) {
	excelBaseData = {};

	    localStorage.removeItem("excelBaseData");
	    localStorage.removeItem("selectedExcelFileName");
	    localStorage.removeItem("excelLoaded");
	    updateExcelButtonState();

        alert("내용입력 시트를 찾을 수 없습니다.");
        return;
    }

    const rows = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: ""
    });

    excelBaseData = {};

    let currentPoll = "";

    for (let r = 3; r < rows.length; r++) {

        // 병합셀 처리
        if (rows[r][0]) {
            currentPoll = rows[r][0];
        }

        const pollName = currentPoll;

        if (!pollName) continue;

        const voterCount = rows[r][3];   // D
        const startNo    = rows[r][13];  // N
        const endNo      = rows[r][15];  // P

        if (!excelBaseData[pollName]) {
            excelBaseData[pollName] = [];
        }

        excelBaseData[pollName].push({
            voterCount,
            startNo,
            endNo
        });
    }

     if (Object.keys(excelBaseData).length === 0) {
        localStorage.removeItem("excelBaseData");
        localStorage.removeItem("selectedExcelFileName");
        localStorage.removeItem("excelLoaded");

        updateExcelButtonState();
        alert("엑셀에서 기준정보를 찾지 못했습니다.");
        return;
    }

    localStorage.setItem(        "excelBaseData",        JSON.stringify(excelBaseData)    );

    console.log(excelBaseData);

//    alert("기준 엑셀 저장 완료");
        document.getElementById("changeNotice").innerText =
            "⚠️ 기초자료 로딩 완료";
        document.getElementById("changeNotice").style.display = "block";


    isExceLoaded = true;

    localStorage.setItem("excelLoaded", "true");
    document.getElementById("loadBaseInfoBtn").disabled = true;
    updateExcelButtonState();
    loadofflineBaseData();
    document.getElementById("loadBaseInfoBtn").disabled = true;     // 기본정보 불러오기
    document.getElementById("reportBtn").disabled = true;
//    loadFromGoogle();
}

function loadofflineBaseData() {

    offlineBaseData = {};

    const list = excelBaseData[getPollName()];
    if (!list) return;

    list.forEach((item, i) => {

        offlineBaseData [i] = {
            start: item.startNo || "",
            end: item.endNo || ""
        };

    });

}

function loadOfflineBaseInfo() {

    const pollName = getPollName();

    const data = excelBaseData[pollName];

    if (!data) {
        alert("저장된 오프라인 기본정보가 없습니다.");
        return;
    }


    elections.forEach((name, i) => {

        const item = data[name];

        if (!item) return;

        document.getElementById('start_' + i).value =
            item.startNo || "";

        document.getElementById('end_' + i).value =
            item.endNo || "";

        document.getElementById('total_' + i).innerText =
            Number(item.voterCount || 0).toLocaleString();

        calc(i);
    });

    alert("📂 오프라인 기본정보 적용 완료");
}

function fillStartEndFromExcel() {
    const list = excelBaseData[getPollName()];
    if (!list) return;

    list.forEach((item, i) => {
        const startEl = document.getElementById("start_" + i);
        const endEl   = document.getElementById("end_" + i);

        // 비어 있을 때만 엑셀값 입력
        if (startEl && !startEl.value) {	            startEl.value = item.startNo || "";	        }

        if (endEl && !endEl.value) {            endEl.value = item.endNo || "";	        }
        calc(i);
    });
}

function updateSyncState(isPending) {

    // 상태 저장
    localStorage.setItem("pendingUpload", isPending ? "true" : "false");

    // 기본정보 불러오기 버튼
    const btn = document.getElementById("loadBaseInfoBtn");

    if (btn) {

        btn.disabled = isPending;

        if (isPending) {
            btn.innerText = "기본정보 불러오기 (저장 필요)";
        } else {
            btn.innerText = "기본정보 불러오기";
        }

    }

}

function markDirty() {
    updateSyncState(true);
}

function markSynced() {
    updateSyncState(false);
}



    function checkEndLimit(i) {
    const startEl = document.getElementById('start_' + i);
    const endEl = document.getElementById('end_' + i);
    const currEl = document.getElementById('curr_' + i);

    const start = parseInt(startEl.value) || 0;
    const end = parseInt(endEl.value) || 0;
    const curr = parseInt(currEl.value) || 0;

    // 👉 기존 에러 스타일 제거
    currEl.classList.remove("input-error");

    // ❗ 수령 끝번호 초과
    if (end > 0 && curr > end) {
        alert("수령 끝번호보다 큰 수가 입력되었습니다. 확인 후 다시 입력해 주세요");

        currEl.classList.add("input-error");
        currEl.value = "";
        calc(i);
        return;
    }

    // ❗ 수령 첫번호 미만
    if (start > 0 && curr < start) {
        alert("수령 첫번호보다 작은 수가 입력되었습니다. 확인 후 다시 입력해 주세요");

        currEl.classList.add("input-error");
        currEl.value = "";
        calc(i);
        return;
    }
}

    function calc(i) {
        const start = parseInt(document.getElementById('start_' + i).value) || 0;
        const end = parseInt(document.getElementById('end_' + i).value) || 0;
        const curr = parseInt(document.getElementById('curr_' + i).value) || 0;
        const dmg = parseInt(document.getElementById('dmg_' + i).value) || 0;
        const dupSerial = parseInt(    document.getElementById('dupSerial_' + i).value) || 0;

        const NoBalsong= parseInt(document.getElementById('NoBalsong_' + i).value) || 0;
        const GeulJung= parseInt(document.getElementById('GeulJung_' + i).value) || 0;
        const GiveBack= parseInt(document.getElementById('GiveBack_' + i).value) || 0;

        const ReturnKorea= parseInt(document.getElementById('ReturnKorea_' + i).value) || 0;
        const DoubleOut= parseInt(document.getElementById('DoubleOut_' + i).value) || 0;

        if (start > 0 && end > 0) {

	//const totalText = document.getElementById('total_' + i).innerText.replace(/,/g, '');
	//const total = parseInt(totalText) || 0;

	const total = (start > 0 && end > 0) ? (end - start + 1  + dupSerial ) :  dupSerial;
	    document.getElementById('total_' + i).innerText = total.toLocaleString();

	    if (curr > 0) {
	        const remain = (end - curr + 1) + dmg;
	        const issued = total - remain;

	        document.getElementById('issued_' + i).innerText = (issued < 0 ? 0 : issued).toLocaleString();
	        document.getElementById('remain_' + i).innerText = (remain < 0 ? 0 : remain).toLocaleString();
	    }
        }
    }

function copyAll() {
        let resultText = `[제9회 전국동시지방선거 투표용지 교부상황]\n전주시완산구선거관리위원회\n${new Date().toLocaleString()}\n\n`;
        elections.forEach((name, i) => {
            const t = document.getElementById('total_' + i).innerText;
            const iso = document.getElementById('issued_' + i).innerText;
            const r = document.getElementById('remain_' + i).innerText;
            if(t !== "0") resultText += `${name}: 수령${t}/교부${iso}/잔여${r}\n`;
        });

        const textArea = document.createElement("textarea");
        textArea.value = resultText;
        textArea.style.position = "fixed"; textArea.style.left = "-9999px"; textArea.style.top = "0";
        document.body.appendChild(textArea);
        textArea.focus(); textArea.select();
        textArea.setSelectionRange(0, 99999);
        try {
            document.execCommand('copy');
            alert("복사되었습니다.");
        } catch (err) {
            alert("복사 실패. 수동으로 복사해주세요.");
        }
        document.body.removeChild(textArea);
    }

function findRowByPollAndElection(sheet, pollName, electionName) {
  const values = sheet.getDataRange().getValues();

  for (let r = 0; r < values.length; r++) {
    const poll = values[r][0]; // A열 (투표구명)
    const election = values[r][2]; // C열 (선거명)

    if (poll === pollName && election === electionName) {
      return r + 1; // 시트 row (1부터 시작)
    }
  }
  return null;
}

function buildOfflineReportData() {

     const pollName = getPollName();

    const boxList =         JSON.parse(localStorage.getItem("box_info") || "[]");

    const box1 = boxList[0] || "";
    const box2 = boxList[1] || "";

    const boxNo =      [box1, box2]          .filter(v => v)          .join(" / ");

    return elections.map((name, index) => ({

        election: name,

	 list1:    Number(        excelBaseData[pollName]?.[index]?.voterCount || 0    ),

	list2: (() => {
	    const issued = Number(        document.getElementById(`issued_${index}`)?.textContent || 0    );
	    const doubleOut = Number(        document.getElementById(`DoubleOut_${index}`)?.value || 0    );
	    const voter = issued - doubleOut;
	    const noBalsong = Number(        document.getElementById(`NoBalsong_${index}`)?.value || 0    );
	    const geulJung = Number(        document.getElementById(`GeulJung_${index}`)?.value || 0    );
	    const giveBack = Number(        document.getElementById(`GiveBack_${index}`)?.value || 0    );
	    const returnKorea = Number(        document.getElementById(`ReturnKorea_${index}`)?.value || 0    );

	    return voter        - noBalsong        - geulJung        - giveBack        - returnKorea;         })(),

	boxNo,

        curr:
            Number(document.getElementById(`curr_${index}`)?.value || 0),

        end:
            Number(document.getElementById(`end_${index}`)?.value || 0),

        noBalsong:
            Number(document.getElementById(`NoBalsong_${index}`)?.value || 0),

        geulJung:
            Number(document.getElementById(`GeulJung_${index}`)?.value || 0),

        giveBack:
            Number(document.getElementById(`GiveBack_${index}`)?.value || 0),

        returnKorea:
            Number(document.getElementById(`ReturnKorea_${index}`)?.value || 0),

	 // 계 = 교부매수 - 이중교부매수
	    voter: (() => {
	        const issued = Number(     document.getElementById(`issued_${index}`)?.textContent || 0    );
	        const doubleOut = Number(  document.getElementById(`DoubleOut_${index}`)?.value || 0       );
	        return issued - doubleOut;
	    })(),



       // total: 
       //     Number(document.getElementById(`total_${index}`)?.textContent || 0),
       total: (() => {
	    const start = Number(document.getElementById(`start_${index}`)?.value || 0);
	    const end   = Number(document.getElementById(`end_${index}`)?.value || 0);
	    const dup   = Number(document.getElementById(`dupSerial_${index}`)?.value || 0);
	    return start && end         ? (end - start + 1 + dup)         : 0;  })(),

        issued:
            Number(document.getElementById(`issued_${index}`)?.textContent || 0),

        //remain:
        //    Number(document.getElementById(`remain_${index}`)?.textContent || 0),
        remain: (() => {
	    const curr = Number(document.getElementById(`curr_${index}`)?.value || 0);
	    const end = Number(document.getElementById(`end_${index}`)?.value || 0);
	    const damage = Number(document.getElementById(`dmg_${index}`)?.value || 0);
	    return curr && end         ? (end - curr + damage + 1)         : 0; })(),

        damageNos:
              damageData[index] || ""
    }));

}

function validateCurrRange(i) {
    const start = parseInt(document.getElementById('start_' + i).value) || 0;
    const end = parseInt(document.getElementById('end_' + i).value) || 0;
    const currEl = document.getElementById('curr_' + i);
    const curr = parseInt(currEl.value) || 0;

    // 기존 표시 제거
    currEl.classList.remove("input-error");

    if (!curr) return;

    if ((start && curr < start) || (end && curr > end)) {
        currEl.classList.add("input-error");
    }
}

        if (!val) return;

        const r = parseRange(val);
        if (r) ranges.push(r);
    });

    // ✅ 1. 정렬
    ranges.sort((a, b) => a[0] - b[0]);

    // ✅ 2. 자동 병합
    const merged = [];

    ranges.forEach(r => {
        if (!merged.length) {
            merged.push(r);
        } else {
            const last = merged[merged.length - 1];

            // 👉 이어지거나 겹치면 병합
            if (r[0] <= last[1] + 1) {
                last[1] = Math.max(last[1], r[1]);
            } else {
                merged.push(r);
            }
        }
    });

    // ✅ 3. 문자열 + 개수 계산
    let result = [];
    let totalCount = 0;

    merged.forEach(([start, end]) => {
        if (start === end) {
            result.push(`No. ${start}`);
            totalCount += 1;
        } else {
            result.push(`No. ${start} ~ ${end}`);
            totalCount += (end - start + 1);
        }
    });

    damageData[currentDamageIndex] = result.join(" / ");

    document.getElementById('dmg_' + currentDamageIndex).value = totalCount;

    calc(currentDamageIndex);
    markChanged();

    closeDamageModal();

    damageChanged = false;
    updateSaveButtonState();
}

function parseRange(val) {
    val = val.trim();

    if (val.includes("~")) {
        const [start, end] = val.split("~").map(v => Number(v));
        if (!start || !end || start > end) return null;
        return [start, end];
    } else {
        const num = Number(val);
        if (!num) return null;
        return [num, num];
    }
}

function isOverlap(r1, r2) {
    return !(r1[1] < r2[0] || r2[1] < r1[0]);
}

function enforceNonNegative(el) {
    if (el.value === "") return;

    let val = Number(el.value);

    if (val < 0) {
        el.value = 0;
    }
}

function validateDamageInput(inputEl) {
    const val = inputEl.value.trim();
    const range = parseRange(val);

    const i = currentDamageIndex;

    const start = parseInt(document.getElementById('start_' + i).value) || 0;
    const end = parseInt(document.getElementById('end_' + i).value) || 0;

    inputEl.classList.remove("input-error");

    if (!range) return true;

    const [s, e] = range;

    // ❗ 음수 체크
    if (s < 0 || e < 0) {
        alert("0보다 작은 번호는 입력할 수 없습니다.");
        inputEl.classList.add("input-error");
        return false;
    }

    // ❗ 수령 범위 체크
    if (start && s < start || end && e > end) {
        alert("수령 범위를 벗어난 번호입니다.");
        inputEl.classList.add("input-error");
        return false;
    }

    return true;
}

        })

        })
    );

    updateServerStatusUI();

function updateServerStatusUI() {

    const el = document.getElementById("serverStatus");
    if (!el) return;

    const saved = JSON.parse(
        localStorage.getItem("serverStatus") || "{}"
    );

    if (saved.state === "online") {

        const time = saved.time             ? new Date(saved.time).toLocaleTimeString("ko-KR", {           hour12: false,           hour: "2-digit",           minute: "2-digit",       })     : "";

        el.innerHTML =             "🟢 온라인 상태 (" + time + ")";         el.style.color = "green";
	 isServerOnline = true;
    } else {

        el.innerHTML =             "🔴 오프라인 상태";         el.style.color = "red";
